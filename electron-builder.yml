# electron-builder config тАФ macOS first (V0). WindowsыКФ V1 ьЭ┤эЫД.
# NotarizationьЭА build-resources/notarize-creds.json ыШРыКФ env varыбЬ ьг╝ьЮЕ.
appId: com.agentlas.desktop
productName: Agentlas
copyright: ┬й 2026 Agentlas

directories:
  output: release
  buildResources: build-resources

afterPack: build-resources/after-pack-clean.cjs

files:
  - dist/electron/**/*
  - dist/renderer/**/*
  - package.json
  - "!**/*.map"

asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"
  - "**/node_modules/keytar/**/*"

# macOS first тАФ Hardened Runtime + notarization ьдАы╣Д
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build-resources/icon.icns
  artifactName: "Agentlas-${version}-${arch}.${ext}"

dmg:
  title: "${productName} ${version}"
  icon: build-resources/icon.icns
  iconSize: 96
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows тАФ unsigned by default (no certificate needed to build or run).
# SmartScreen shows a one-time "More info тЖТ Run anyway"; the portable .exe runs
# without installing. Add CSC_LINK / CSC_KEY_PASSWORD in CI later to ship signed.
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build-resources/icon-1024.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "Agentlas-Setup-${version}.${ext}"

portable:
  artifactName: "Agentlas-${version}-portable.${ext}"

# Linux тАФ unsigned. AppImage runs on any x64 distro (chmod +x then run);
# .deb for Debian/Ubuntu.
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  icon: build-resources/icon-1024.png
  artifactName: "Agentlas-${version}.${ext}"

publish:
  - provider: github
    owner: jeongmk522-netizen
    repo: agentlas-desktop
    private: false
    releaseType: release
