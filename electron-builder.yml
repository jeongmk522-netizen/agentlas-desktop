# electron-builder config вҖ” macOS first (V0). WindowsлҠ” V1 мқҙнӣ„.
# NotarizationмқҖ build-resources/notarize-creds.json лҳҗлҠ” env varлЎң мЈјмһ….
appId: com.agentlas.desktop
productName: Agentlas
copyright: В© 2026 Agentlas

directories:
  output: release
  buildResources: build-resources

afterPack: build-resources/after-pack-clean.cjs

files:
  - dist/electron/**/*
  - dist/renderer/**/*
  - package.json
  - "!**/*.map"

asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"
  - "**/node_modules/keytar/**/*"

# macOS first вҖ” Hardened Runtime + notarization мӨҖл№„
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build-resources/icon.icns
  artifactName: "Agentlas-${version}-${arch}.${ext}"

dmg:
  title: "${productName} ${version}"
  icon: build-resources/icon.icns
  iconSize: 96
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# V1 мқҙнӣ„ м¶”к°Җ
# win:
#   target: nsis
#   icon: build-resources/icon.ico

publish:
  - provider: github
    owner: jeongmk522-netizen
    repo: agentlas-desktop
    private: false
    releaseType: release
