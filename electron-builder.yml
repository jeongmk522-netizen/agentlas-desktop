# electron-builder config — macOS first (V0). Windows는 V1 이후.
# Notarization은 build-resources/notarize-creds.json 또는 env var로 주입.
appId: com.agentlas.desktop
productName: Agentlas
copyright: © 2026 Agentlas

directories:
  output: release
  buildResources: build-resources

afterPack: build-resources/after-pack-clean.cjs

files:
  - dist/electron/**/*
  # dist/shared/** holds runtime values (shared/models.ts: BYOK_MODELS, context policy).
  # detect.ts/byok.ts value-import it, so it MUST be packaged or the app crashes at launch.
  - dist/shared/**/*
  - dist/renderer/**/*
  - cli/**/*
  - package.json
  - "!**/*.map"

asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"
  - "**/node_modules/keytar/**/*"

# macOS first — Hardened Runtime + notarization 준비
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  notarize: true
  # zip is REQUIRED for macOS auto-update (Squirrel.Mac). dmg is for manual install.
  # electron-builder 25.x still writes the .dmg into latest-mac.yml, so the mac pipeline
  # runs scripts/fix-mac-latest-zip.mjs to repoint the feed at the .zip after build.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build-resources/icon.icns
  artifactName: "Agentlas-${version}-${arch}.${ext}"

dmg:
  title: "${productName} ${version}"
  icon: build-resources/icon.icns
  iconSize: 96
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows — unsigned by default (no certificate needed to build or run).
# SmartScreen shows a one-time "More info → Run anyway"; the portable .exe runs
# without installing. Add CSC_LINK / CSC_KEY_PASSWORD in CI later to ship signed.
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build-resources/icon-1024.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # 사람이 알아보기 쉬운 이름: OS + 아키텍처 + 종류
  artifactName: "Agentlas-${version}-Windows-x64-Setup.${ext}"

portable:
  artifactName: "Agentlas-${version}-Windows-x64-Portable.${ext}"

# Linux — unsigned. AppImage runs on any x64 distro (chmod +x then run);
# .deb for Debian/Ubuntu.
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  icon: build-resources/icon-1024.png
  artifactName: "Agentlas-${version}-Linux-x64.${ext}"

publish:
  - provider: github
    owner: jeongmk522-netizen
    repo: agentlas-desktop
    private: false
    releaseType: release
