# electron-builder config вАФ macOS first (V0). WindowsлКФ V1 мЭінЫД.
# NotarizationмЭА build-resources/notarize-creds.json лШРлКФ env varл°Ь м£ЉмЮЕ.
appId: com.agentlas.desktop
productName: Agentlas
copyright: ¬© 2026 Agentlas

directories:
  output: release
  buildResources: build-resources

afterPack: build-resources/after-pack-clean.cjs

files:
  - dist/electron/**/*
  - dist/renderer/**/*
  - package.json
  - "!**/*.map"

asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"
  - "**/node_modules/keytar/**/*"

# macOS first вАФ Hardened Runtime + notarization м§АлєД
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  notarize: true
  # zip is REQUIRED for macOS auto-update (Squirrel.Mac). dmg is for manual install.
  # zip must be LAST: electron-builder writes latest-mac.yml from the last target.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build-resources/icon.icns
  artifactName: "Agentlas-${version}-${arch}.${ext}"

dmg:
  title: "${productName} ${version}"
  icon: build-resources/icon.icns
  iconSize: 96
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows вАФ unsigned by default (no certificate needed to build or run).
# SmartScreen shows a one-time "More info вЖТ Run anyway"; the portable .exe runs
# without installing. Add CSC_LINK / CSC_KEY_PASSWORD in CI later to ship signed.
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build-resources/icon-1024.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # мВђлЮМмЭі мХМмХДл≥ікЄ∞ мЙђмЪі мЭіл¶Д: OS + мХДнВ§нЕНм≤Ш + мҐЕл•Ш
  artifactName: "Agentlas-${version}-Windows-x64-Setup.${ext}"

portable:
  artifactName: "Agentlas-${version}-Windows-x64-Portable.${ext}"

# Linux вАФ unsigned. AppImage runs on any x64 distro (chmod +x then run);
# .deb for Debian/Ubuntu.
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  icon: build-resources/icon-1024.png
  artifactName: "Agentlas-${version}-Linux-x64.${ext}"

publish:
  - provider: github
    owner: jeongmk522-netizen
    repo: agentlas-desktop
    private: false
    releaseType: release
